<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Q-Nekt | UPOU Quality Assurance System</title>

  <!--
    ════════════════════════════════════════════════════════════════
    Q-Nekt · UPOU Quality Assurance System
    ════════════════════════════════════════════════════════════════
    This is the entry point. It is intentionally lean — all HTML
    content, CSS, and JavaScript live in separate files so the
    codebase stays organised and easy to maintain.

    How the page is assembled:
      1. styles.css    Loads the stylesheet (colours, layout, components)
      2. shell.js      Defines template strings for the persistent shell
                       (header, nav, sidebar, notification toast)
      3. pages/*.js    Each file defines a template string for one page
                       (Dashboard, Data Entry, Reports, Historical Data)
      4. app.js        Defines all JavaScript functions (navigation,
                       data entry, reports, activity log, notifications)
      5. loader.js     On DOMContentLoaded: injects all templates into
                       their <div id="slot-*"> placeholders below, then
                       calls initQNekt() to boot the app

    To add a new page:
      1. Create pages/my-page.js and export a MY_PAGE_HTML const
      2. Add a slot <div id="slot-my-page"></div> in the main below
      3. Add it to the slots map in loader.js
      4. Add a nav button in shell.js (SIDEBAR_HTML and NAV_HTML)
      5. Register the page in showPage() in app.js
    ════════════════════════════════════════════════════════════════
  -->

  <!-- All styling: colours, layout, components, scrollbar -->
  <link rel="stylesheet" href="styles.css"/>

  <!-- Google Fonts: Playfair Display (headings) + DM Sans (body) -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <!--
    HTML Templates
    Each file exports a JavaScript const containing the HTML for
    that section. loader.js injects them into the slots below.
    They must be loaded before loader.js.
  -->
  <script src="shell.js"></script>
  <script src="pages/dashboard.js"></script>
  <script src="pages/data-entry.js"></script>
  <script src="pages/reports.js"></script>
  <script src="pages/historical.js"></script>

  <!--
    Application Logic & Loader
    app.js must be loaded before loader.js so all functions
    (including initQNekt) are defined when loader.js calls them.
  -->
  <script src="app.js"></script>
  <script src="loader.js"></script>

  <!--
    Database & Encryption Layer
    Must be loaded after app.js and loader.js so all Q-Nekt UI
    functions exist before db-integration.js hooks into them.

    db-crypto.js     — AES-GCM 256-bit encryption (Web Crypto API)
    db.js            — IndexedDB schema, CRUD, audit log, export/import
    db-integration.js — Wires forms to DB, renders tables, unlock modal
  -->
  <script src="db-crypto.js"></script>
  <script src="db.js"></script>
  <script src="db-integration.js"></script>
</head>
<body>

  <!-- University header bar (injected from shell.js → HEADER_HTML) -->
  <div id="slot-header"></div>

  <!-- Top navigation tabs (injected from shell.js → NAV_HTML) -->
  <div id="slot-nav"></div>

  <!-- App body: sidebar on the left, main content on the right -->
  <div class="app-body">

    <!-- Left sidebar: nav links, data source dots, AY label
         (injected from shell.js → SIDEBAR_HTML) -->
    <div id="slot-sidebar"></div>

    <!-- Main scrollable content area — one slot per page.
         Only the active page is visible at a time (controlled
         by showPage() in app.js). -->
    <main class="main">
      <div id="slot-dashboard"></div>
      <div id="slot-data-entry"></div>
      <div id="slot-reports"></div>
      <div id="slot-historical"></div>
    </main>

  </div>

  <!-- Toast notification — brief pop-up after user actions
       (injected from shell.js → NOTIF_HTML) -->
  <div id="slot-notif"></div>

</body>
</html>
